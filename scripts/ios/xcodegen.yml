# xcodegen.yml — XcodeGen project spec for qtapp iOS
#
# Usage:
#   xcodegen generate --spec scripts/ios/xcodegen.yml
#
# Prerequisites (handled by setup.sh):
#   - xcodegen installed (brew install xcodegen)
#   - Python.xcframework present at frameworks/Python.xcframework
#   - PySide6 dylibs/frameworks present at frameworks/PySide6/
#
# Variables are substituted from config.env or the environment.
# To override, set them before running xcodegen:
#   BUNDLE_ID=dev.you.app APP_NAME=MyApp xcodegen generate ...
#
# After generation, open ${APP_NAME}.xcodeproj in Xcode to configure
# code signing (or use an .xcconfig — see config.env.example).

name: "${APP_NAME}"
options:
  bundleIdPrefix: ""       # full BUNDLE_ID set per-target below
  deploymentTarget:
    iOS: "16.0"
  groupSortPosition: top
  createIntermediateGroups: true
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_BITCODE: NO
    # PySide6 dylibs are re-signed by the build phase; Python .so files are
    # pre-signed by a preBuildScript before Copy Bundle Resources runs.
    # --deep is intentionally absent: it re-signs nested binaries after Xcode
    # hashes them into CodeResources, breaking the bundle seal.
    # Required for Python ctypes / dlopen on iOS
    OTHER_LDFLAGS:
      - "-Wl,-export_dynamic"

targets:
  "${APP_NAME}":
    type: application
    platform: iOS
    deploymentTarget: "16.0"

    # ── Info.plist ────────────────────────────────────────────────────────
    # XcodeGen owns Info.plist — it regenerates it on every `xcodegen generate`.
    # Add/remove keys here; do NOT hand-edit Info.plist.
    # To add a URL scheme or iCloud container, uncomment the relevant block.
    info:
      path: Info.plist
      properties:
        # Python module to run — AppDelegate reads this key at launch.
        # Change to your app's top-level package name when deriving a new app.
        MainModule: qtapp

        # Empty UILaunchScreen opts in to full native screen size.
        # Without this iOS runs the app in 320×480 compatibility mode.
        UILaunchScreen: {}

        LSRequiresIPhoneOS: true
        UIRequiredDeviceCapabilities:
          - arm64

        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

        # Qt manages the window; disable iOS multi-scene
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false

        UIStatusBarHidden: false
        UIStatusBarStyle: UIStatusBarStyleDefault

        # Expose Documents/ in the Files app
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true

        # ── URL scheme (uncomment + fill in to register) ──────────────────
        # After changing: re-run setup.sh to regenerate the project.
        # CFBundleURLTypes:
        #   - CFBundleURLName: $(PRODUCT_BUNDLE_IDENTIFIER)
        #     CFBundleURLSchemes:
        #       - myapp

        # ── iCloud Documents ───────────────────────────────────────────────
        NSUbiquitousContainers:
          "iCloud.$(PRODUCT_BUNDLE_IDENTIFIER)":
            NSUbiquitousContainerIsDocumentScopePublic: true
            NSUbiquitousContainerName: $(PRODUCT_NAME)
            NSUbiquitousContainerSupportedFolderLevels: Any

    # ── Entitlements ──────────────────────────────────────────────────────
    # XcodeGen generates entitlements.plist from these properties.
    # Add/remove keys here; do NOT hand-edit entitlements.plist.
    entitlements:
      path: entitlements.plist
      properties:
        # iCloud Documents — exposes container in Files app
        com.apple.developer.icloud-services:
          - CloudDocuments
        com.apple.developer.ubiquity-container-identifiers:
          - "iCloud.$(CFBundleIdentifier)"

    # ── Pre-build scripts ──────────────────────────────────────────────────
    # preBuildScripts run before Copy Bundle Resources.  We sign the source
    # .so files in place so that when Xcode copies them via the folder
    # reference they already carry a valid signature.  Xcode then hashes the
    # signed files into CodeResources without needing --deep.
    preBuildScripts:
      - name: "Pre-sign Python extension modules"
        shell: /bin/bash
        script: |
          set -e
          if [ "$EFFECTIVE_PLATFORM_NAME" = "-iphonesimulator" ]; then
              echo "Pre-sign Python ext: simulator build — skipping"
              exit 0
          fi
          if [ -z "${EXPANDED_CODE_SIGN_IDENTITY}" ]; then
              echo "Pre-sign Python ext: WARNING — no signing identity, skipping"
              exit 0
          fi
          count=0
          # Sign Python stdlib extension modules (lib-dynload)
          DYNLOAD="${SRCROOT}/python/lib/python3.12/lib-dynload"
          if [ -d "${DYNLOAD}" ]; then
              for so in "${DYNLOAD}"/*.so; do
                  [ -f "${so}" ] || continue
                  codesign --force --sign "${EXPANDED_CODE_SIGN_IDENTITY}" "${so}"
                  count=$((count + 1))
              done
          fi
          # Sign app_packages extension modules (.so / .abi3.so), excluding
          # .framework directories (those are handled by sign_pyside6.sh).
          APP_PKG="${SRCROOT}/app_packages"
          if [ -d "${APP_PKG}" ]; then
              while IFS= read -r -d '' so; do
                  codesign --force --sign "${EXPANDED_CODE_SIGN_IDENTITY}" "${so}"
                  count=$((count + 1))
              done < <(find "${APP_PKG}" -name "*.so" -not -path "*/.framework/*" -print0 2>/dev/null)
          fi
          echo "Pre-sign Python ext: signed ${count} source extension module(s)"
        runOnlyWhenInstalling: false

    # ── Source files + bundle resources ──────────────────────────────────
    # Folder references (type: folder) go under sources; XcodeGen adds them
    # to Copy Bundle Resources automatically (they are NOT compiled).
    #
    # setup.sh populates resources/ with:
    #   resources/python/         — Python stdlib (from Python.xcframework)
    #   resources/app/            — Python app source (src/qtapp/)
    #   resources/app_packages/   — pip-installed dependencies
    sources:
      - path: objc
        type: group
        includes:
          - "*.m"
          - "*.h"
      # Bundle resources (folder references — copied to bundle root, not compiled)
      # Layout matches Briefcase / main.m expectations:
      #   python/   → PYTHONHOME ({bundleRoot}/python)
      #   app/      → Python app source ({bundleRoot}/app)
      #   app_packages/ → pip packages (added via site.addsitedir)
      - path: python
        type: folder
      - path: app
        type: folder
      - path: app_packages
        type: folder

    # ── Frameworks / libraries ────────────────────────────────────────────
    dependencies:
      # Python interpreter
      - framework: frameworks/Python.xcframework
        embed: true
        codeSign: true
      # PySide6 / Qt frameworks are embedded via the "Sign & embed PySide6" build phase.
      # Individual dylibs listed here would require repeating every Qt module;
      # the build phase script handles signing and embedding them all at once.

    # ── Build settings ────────────────────────────────────────────────────
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "${BUNDLE_ID}"
        PRODUCT_NAME: "${APP_NAME}"
        CODE_SIGN_ENTITLEMENTS: "$(SRCROOT)/entitlements.plist"
        # Python.xcframework header search path
        HEADER_SEARCH_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)/frameworks/Python.xcframework/ios-arm64/Python.framework/Headers"
        # Link against Python.framework
        FRAMEWORK_SEARCH_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)/frameworks"
          - "$(SRCROOT)/frameworks/Python.xcframework/ios-arm64"
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
        # Needed so the ObjC app delegate finds AppDelegate.h
        GCC_PREPROCESSOR_DEFINITIONS:
          - "$(inherited)"
        CLANG_ENABLE_OBJC_ARC: YES
        # Silence deprecated UIApplicationMain warning (we pass nil for principal class)
        GCC_WARN_ABOUT_DEPRECATED_FUNCTIONS: NO

      configs:
        Debug:
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          GCC_OPTIMIZATION_LEVEL: "0"
          MTL_ENABLE_DEBUG_INFO: INCLUDE_SOURCE
        Release:
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          GCC_OPTIMIZATION_LEVEL: s
          VALIDATE_PRODUCT: YES

    # ── Post-build scripts ─────────────────────────────────────────────────
    # xcodegen key: postBuildScripts (runs after Copy Bundle Resources,
    # before Xcode's final app signing step).
    postBuildScripts:

      # Sign and embed all PySide6 / Qt dylibs before Xcode's own sign step.
      # The script iterates frameworks/PySide6/ and re-signs each dylib with
      # the project's signing identity, then copies them into the app bundle.
      - name: "Sign and embed PySide6 dylibs"
        script: |
          bash "${SRCROOT}/sign_pyside6.sh"
        runOnlyWhenInstalling: false

      # Sync Python app source into the bundle (incremental rsync).
      # This lets you iterate on Python code without a full Xcode rebuild.
      - name: "Sync Python app source"
        script: |
          DEST="${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/app"
          mkdir -p "$DEST"
          rsync -a --delete "${SRCROOT}/../../src/qtapp/" "$DEST/qtapp/"
        runOnlyWhenInstalling: false

      # Bundle example sub-apps so they're available in the launcher
      # without a separate deploy step.  Picker scans bundle_root/apps/.
      - name: "Sync bundled apps"
        script: |
          DEST="${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/apps"
          mkdir -p "$DEST"
          rsync -a --delete "${SRCROOT}/../../apps/" "$DEST/"
        runOnlyWhenInstalling: false

      # Build QML module stubs for iOS.
      #
      # Qt's qrc-embedded qmldirs reference plugin .so files that don't exist
      # in a dynamic PySide6 iOS build.  This phase reads the QML module files
      # from the macOS PySide6 installation, strips the iOS-incompatible
      # directives (plugin, classname, prefer), and bundles the result at
      # {bundle}/qml_stubs/.  At runtime the engine is pointed at qml_stubs/
      # before the qrc paths, so it never encounters the broken plugin line.
      #
      # Requires a Python with PySide6 importable on the build machine.
      # Set PYSIDE6_PYTHON in config.env to pin a specific interpreter, e.g.:
      #   PYSIDE6_PYTHON=/opt/homebrew/Caskroom/miniforge/base/envs/myenv/bin/python3
      # If unset, the script searches common conda environments automatically.
      #
      # NOTE: The macOS PySide6 version should match the iOS wheel.  A minor
      # mismatch is tolerated for stable controls (Button, Label, SpinBox, etc.)
      # but types added in newer Qt releases may be missing from the stubs.
      # Rebuild with a matching PySide6 version when upgrading the iOS wheel.
      - name: "Prepare QML stubs for iOS"
        script: |
          set -e
          # ── find a Python that has PySide6 ──────────────────────────────
          PYSIDE6_PY="${PYSIDE6_PYTHON:-}"
          if [[ -n "$PYSIDE6_PY" ]]; then
              if ! "$PYSIDE6_PY" -c "import PySide6" 2>/dev/null; then
                  echo "warning: PYSIDE6_PYTHON ($PYSIDE6_PY) cannot import PySide6" >&2
                  PYSIDE6_PY=""
              fi
          fi
          if [[ -z "$PYSIDE6_PY" ]]; then
              for candidate in \
                  python3 \
                  /opt/homebrew/Caskroom/miniforge/base/envs/*/bin/python3 \
                  /opt/homebrew/bin/python3 \
                  /usr/local/bin/python3; do
                  if "$candidate" -c "import PySide6" 2>/dev/null; then
                      PYSIDE6_PY="$candidate"
                      break
                  fi
              done
          fi
          if [[ -z "$PYSIDE6_PY" ]]; then
              echo "error: No Python with PySide6 found. Set PYSIDE6_PYTHON in config.env." >&2
              exit 1
          fi
          # ── run the extraction script ───────────────────────────────────
          DEST="${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/qml_stubs"
          mkdir -p "$DEST"
          "$PYSIDE6_PY" "${SRCROOT}/prepare_qml_stubs.py" --dest "$DEST"
        runOnlyWhenInstalling: false
